<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My-Flix Project Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0d0f;
        --panel: #18181b;
        --text: #ffffff;
        --muted: #a7a7ad;
        --brand: #e50914;
        --line: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(10, 10, 11, 0.96), rgba(10, 10, 11, 0.74), rgba(10, 10, 11, 0.28)),
          var(--hero, url("assets/hero-projects.png")) center / cover fixed,
          var(--bg);
        color: var(--text);
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        align-content: center;
        gap: 34px;
        padding: clamp(24px, 6vw, 72px);
      }

      .brand {
        color: var(--brand);
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 900;
        text-transform: uppercase;
      }

      .demo {
        width: min(860px, 100%);
      }

      .demo p,
      .demo li {
        color: rgba(255, 255, 255, 0.84);
        line-height: 1.6;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 11vw, 8rem);
        line-height: 0.9;
      }

      .meta {
        margin: 18px 0 18px;
        color: #fff;
        font-weight: 800;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 14px;
        width: min(960px, 100%);
      }

      .tile {
        min-height: 128px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 24, 27, 0.82);
        padding: 18px;
      }

      .tile strong {
        display: block;
        margin-bottom: 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        padding: 0 18px;
        background: #fff;
        color: #111;
        font-weight: 900;
        text-decoration: none;
      }

      .button.dark {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand">My-Flix</div>
      <section class="demo">
        <div class="meta" id="meta">Project Demo</div>
        <h1 id="title">Project Preview</h1>
        <p id="description"></p>
        <div class="actions">
          <a class="button" href="index.html?section=projects">Back to My-Flix</a>
          <a class="button dark" id="repoLink" href="index.html?section=projects">GitHub link can be added in Customize</a>
        </div>
      </section>
      <section class="preview-grid" id="features"></section>
    </main>

    <script>
      const demos = {
        cineboard: {
          title: "CineBoard",
          meta: "React, API, Vercel",
          hero: "assets/hero-projects.png",
          description:
            "This local preview stands in for your deployed Vercel project while you are testing My-Flix. Replace the Vercel/project link in Customize when your real app is ready.",
          features: ["Movie search", "Saved watchlist", "Responsive cards", "Fast project handoff"]
        },
        taskforge: {
          title: "TaskForge",
          meta: "Full Stack Productivity",
          hero: "assets/hero-projects.png",
          description:
            "A local placeholder preview for the productivity workspace sample. Add your real GitHub and Vercel URLs from the admin Customize panel.",
          features: ["Kanban workflow", "Task templates", "Team notes", "Status tracking"]
        },
        "insight-desk": {
          title: "Insight Desk",
          meta: "Analytics Dashboard",
          hero: "assets/hero-projects.png",
          description:
            "A local placeholder preview for the analytics dashboard sample. Use it to confirm the Open button works before replacing links.",
          features: ["KPI panels", "Charts", "Filters", "Report-ready layout"]
        },
        shopline: {
          title: "ShopLine",
          meta: "E-commerce Frontend",
          hero: "assets/hero-projects.png",
          description:
            "A local placeholder preview for the commerce sample. Replace this with the real deployed project URL when you have it.",
          features: ["Product grid", "Cart flow", "Checkout states", "Responsive navigation"]
        }
      };

      const project = new URLSearchParams(window.location.search).get("project") || "cineboard";
      const demo = demos[project] || demos.cineboard;
      document.documentElement.style.setProperty("--hero", `url("${demo.hero}")`);
      document.getElementById("title").textContent = demo.title;
      document.getElementById("meta").textContent = demo.meta;
      document.getElementById("description").textContent = demo.description;
      document.getElementById("features").innerHTML = demo.features
        .map((feature) => `<article class="tile"><strong>${feature}</strong><span>Demo placeholder content for portfolio testing.</span></article>`)
        .join("");
    </script>
  </body>
</html>
